# データベース接続設定 (環境変数があれば優先、なければ localhost)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:ecg_app}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:password123}

# Hibernateの設定
# 本番では update にしておくことで、テーブルを壊さず差分だけ更新します
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# ポート番号（サーバー側で指定されることが多いため）
server.port=${PORT:8080}