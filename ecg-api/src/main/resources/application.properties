# 接続URL（オプションを最小限かつ確実に）
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/digitalpulse?useSSL=false&serverTimezone=Asia/Tokyo

spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:1234}

# 接続が遅い場合に備えてタイムアウトを伸ばす
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# テーブルの自動作成
spring.jpa.hibernate.ddl-auto=update
# SQLログを非表示（ログをスッキリさせる）
spring.jpa.show-sql=false

# ポート番号（Renderの指定に合わせる）
server.port=${PORT:8080}

# AI Cloud Run URL
ai.api.url=https://digitalpulse-ai-577228926445.asia-northeast1.run.app