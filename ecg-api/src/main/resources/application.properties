# --- 基本設定 ---
spring.application.name=ecg-api
server.port=${PORT:10000}

# --- データベース設定 (Railway) ---
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=Asia/Tokyo
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# --- 高速化のための重要設定 ---
# 1. DBの種類を明示（これで自動判定の時間をゼロにします）
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 2. 起動時のテーブル自動生成をオフ（Railwayにテーブルがあれば不要）
spring.jpa.hibernate.ddl-auto=none
# 3. 余計なメタデータ取得をスキップ
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# --- AI (Cloud Run) 設定 ---
ai.api.url=https://digitalpulse-ai-577228926445.asia-northeast1.run.app

# --- ログをスリム化して高速化 ---
logging.level.org.hibernate=ERROR
logging.level.root=INFO